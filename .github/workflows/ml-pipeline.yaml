name: ML Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          # pip install kfp==1.8.22
          # pip install kfp
          pip install kfp==2.4.0

      - name: Debug Username
        run: |
          echo "Username is: ${{secrets.DOCKER_USERNAME}}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: Log in to Docker Hub
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-pipeline:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-pipeline:latest

      - name: Compile Pipeline
        run: |
          python pipeline.py

      - name: Submit Pipeline Run
        env:
          KFP_ENDPOINT: http://localhost:8080
        run: |
          python submit_run.py
